# Kōan Configuration
#
# IMPORTANT: Values starting with "CHANGE:" must be updated before running.
# Kōan will work with sensible defaults for most other settings.

# Paths — these are mostly set via environment variables now.
# You can override here if needed, but KOAN_PROJECT_PATH / KOAN_PROJECTS
# in .env is the preferred method.
# project_path: "/path/to/your/project"
# pilot_repo: "/path/to/koan"

# Start on pause — boot directly into pause mode
# When true, Kōan starts paused and waits for an explicit /resume before
# picking up missions. Useful for scheduled launches (cron, launchd) where
# you want the stack running but idle until you're ready.
# Manual pauses (/pause) are preserved; stale system pauses (quota, max_runs)
# are replaced with a clean start_on_pause reason.
# The /resume command sets KOAN_SKIP_START_PAUSE=1 internally so auto-restart
# after resume doesn't immediately re-pause.
# start_on_pause: false

# Start in passive mode — boot into read-only mode
# When true, Kōan starts in passive mode: the loop runs (heartbeat, GitHub
# notification polling, Telegram commands) but never executes missions or
# autonomous work. Use /active to resume normal execution.
# start_passive: false

# Focus mode (permanent) — only run explicitly queued missions
# When true, Kōan becomes a pure "mission executor": no DEEP mode, no
# contemplative sessions, no autonomous exploration. Only missions queued
# via /mission (Telegram), recurring missions, and GitHub @mention commands
# are executed. The loop idles (wake-on-mission) whenever the queue is empty.
#
# This is the config-level permanent switch. The /focus Telegram command
# provides time-bounded focus (e.g. /focus 3h). Both produce the same
# runtime behavior.
#
# Per-project override: set focus: true/false in projects.yaml under
# defaults or individual projects. Config.yaml sets the global default.
#
# Differs from passive mode:
#   - passive = no execution at all (missions stay Pending)
#   - focus   = autonomous work disabled, but missions still run
#
# Env override: KOAN_FOCUS=1 (truthy values)
# focus: false

# Startup reflection — run self-reflection check on startup
# When true, Kōan checks whether periodic self-reflection is due (every N
# sessions) and, if so, invokes Claude to generate observations. Disabled by
# default to avoid unexpected Claude CLI calls at boot time.
# startup_reflection: false

# Budget & Scheduling
# These are the primary source of truth for run loop configuration.
# max_runs_per_day: Maximum runs before auto-pause (resets on /resume or quota reset)
# interval_seconds: Seconds between runs (how often the loop iterates)
max_runs_per_day: 20
interval_seconds: 300

# Startup delay — seconds to wait before the first mission after boot.
# Gives you time to send /pause before any mission runs.
# Set to 0 to disable. Skipped automatically if already paused at startup.
# startup_delay: 30

# Auto-pause — automatically pause after max_runs or idle timeout.
# When false, Kōan keeps running indefinitely (quota and error pauses still apply).
# Useful when you have scheduled recurring tasks that must fire reliably.
# auto_pause: true

# Prompt caching behavior
# Keep consecutive autonomous runs on the same project to preserve
# prompt-prefix cache warmth across iterations.
# 0 = disabled (always avoid repeating last project, legacy behavior)
# 100 = always stay on the previous project when still eligible
# prompt_caching:
#   same_project_stickiness_percent: 30

# Fast reply mode — use lightweight model (Haiku) for command handlers
# When true, /usage, /sparring, and similar commands use Haiku instead of default model
# Faster response, lower cost, but simpler answers
fast_reply: false

# Debug mode — write detailed mission execution logs to .koan-debug.log
# Use `tail -f .koan-debug.log` to watch dispatch decisions, commands, and errors
# debug: false

# CLI output journal — stream CLI output to the daily journal file in real-time
# When enabled, mission and contemplative CLI output is appended to the project's
# journal file as it runs. Use `tail -f instance/journal/YYYY-MM-DD/project.md`
# to watch the agent work. Set to false to disable.
# cli_output_journal: true

# Branch prefix — used for all agent-created branches
# Default is "koan" which creates branches like "koan/fix-something"
# Change this for multi-bot setups to avoid branch name collisions
# e.g., "koan-alice" creates branches like "koan-alice/fix-something"
# branch_prefix: "koan"

# CI fix max attempts — maximum number of Claude-based fix attempts per PR
# When CI fails after a rebase/push, Kōan will attempt to fix it up to this
# many times. Each attempt: fetch failure logs → run Claude → force-push →
# re-check. The counter is stored in the ## CI section of missions.md, so
# it's visible in your task queue. Default: 5.
# ci_fix_max_attempts: 5

# Skill timeout — maximum seconds for heavy skill execution (fix, implement, recreate)
# These skills invoke Claude with full tool access and can run for a long time.
# Increase if you see timeouts on complex issues; decrease to save quota.
# Default: 3600 (60 minutes). Previous default was 900 (15 minutes).
skill_timeout: 3600

# Skill max turns — maximum agentic turns for heavy skill execution
# Controls how many back-and-forth turns Claude CLI is allowed during
# /implement, /fix, and /incident invocations. Complex multi-step plans
# may need more turns to complete. If you see "Reached max turns (N)"
# errors, increase this value.
# Default: 200.
# skill_max_turns: 200

# Post-mission pipeline timeout — maximum seconds for the steps that run after
# a mission completes: verification, reflection, PR review learning, auto-merge.
# Increase if post-mission steps are being cut short; decrease to keep the loop snappy.
# Default: 300 (5 minutes).
# post_mission_timeout: 300

# Contemplative mode trigger chance (0-100%)
# When no mission is pending, this is the probability of running a reflective
# session instead of autonomous work. Allows regular moments of introspection
# without waiting for budget exhaustion.
# 0 = never contemplative, 10 = ~1 in 10 runs, 20 = ~1 in 5 runs
contemplative_chance: 10

# Notification priority filtering
# Controls which priority levels are sent to Telegram vs written to the daily journal.
# Priority levels (highest to lowest): urgent, action, warning, info
#   urgent  — critical failures, quota exhausted (always sent)
#   action  — mission complete, command responses (default threshold)
#   warning — quota low, focus validation warnings
#   info    — progress updates, reflections
# Messages below min_priority are suppressed from Telegram and written to the daily
# journal instead (under a "notifications" project entry), so nothing is lost.
# Default: "action" (sends urgent + action; suppresses warning + info)
# notifications:
#   min_priority: action

# Telegram
# NOTE: Prefer setting these in .env (KOAN_TELEGRAM_TOKEN, KOAN_TELEGRAM_CHAT_ID)
# These config values are only used if the env vars are not set.
telegram:
  bot_token: ""   # Set via KOAN_TELEGRAM_TOKEN in .env (recommended)
  chat_id: ""     # Set via KOAN_TELEGRAM_CHAT_ID in .env (recommended)

# Messaging provider configuration (optional)
# Controls which messaging platform Kōan uses for communication.
# If not specified, defaults to "telegram" (backward compatible).
# Can also be set via KOAN_MESSAGING_PROVIDER env var (overrides this).
# messaging:
#   provider: "telegram"  # "telegram" (default) or "slack"

# Usage thresholds
budget:
  warn_at_percent: 70   # Send warning via Telegram
  stop_at_percent: 85   # Stop running

# Claude tools configuration
# SECURITY: Chat and missions have separate tool sets to prevent prompt injection.
# Telegram messages are untrusted input — they only get read-only tools.
tools:
  # Chat tools — restricted set for Telegram/dashboard conversations
  # Default is read-only: no Bash, Edit, or Write to prevent prompt injection
  chat: ["Read", "Glob", "Grep"]
  # Mission tools — full access for autonomous execution
  mission: ["Read", "Glob", "Grep", "Edit", "Write", "Bash"]
  description: |
    Available capabilities:
    - File operations: Read, Edit, Write files in the project
    - Search: Glob (find files), Grep (search content)
    - Shell: Bash (run git, gh, make, and other commands)

# CLI provider — which AI CLI to use as the backend
# Options: "claude" (default), "codex" (OpenAI Codex CLI), "copilot" (GitHub Copilot CLI), "local" (local LLM)
# Can also be set via KOAN_CLI_PROVIDER env var (overrides this)
cli_provider: "claude"

# Skip permission prompts — adds --dangerously-skip-permissions to Claude CLI.
# WARNING: Does NOT work when Koan runs as root (Claude CLI rejects it).
# For MCP tools, use .claude/settings.local.json allowlists instead.
# See docs/provider-claude.md for details.
# skip_permissions: false

# MCP server configuration — paths to MCP config JSON files.
# Passed as --mcp-config to the Claude CLI.
# For autonomous mode, pre-approve MCP tools in the project's
# .claude/settings.local.json (see docs/provider-claude.md).
# Per-project overrides available in projects.yaml (replaces global list).
# mcp:
#   - "/path/to/mcp-servers.json"

# Local LLM configuration (used when cli_provider: "local")
# Connects to any OpenAI-compatible API server:
#   - Ollama:     http://localhost:11434/v1
#   - llama.cpp:  http://localhost:8080/v1
#   - LM Studio:  http://localhost:1234/v1
#   - vLLM:       http://localhost:8000/v1
# Can also be set via KOAN_LOCAL_LLM_* env vars (override config values)
# local_llm:
#   base_url: "http://localhost:11434/v1"
#   model: "glm4"
#   api_key: ""   # Usually empty for local servers

# Claude model configuration
# Controls which models are used for different types of Claude calls
# Empty string = use default model (subscription default or ANTHROPIC_MODEL)
models:
  mission: ""              # Main mission execution (empty = default)
  chat: ""                 # Telegram/dashboard chat responses
  lightweight: "haiku"     # Low-cost calls: format_outbox, pick_mission, contemplative
  fallback: "sonnet"       # Fallback when primary model is overloaded (print mode only)
  review_mode: ""          # Override model for REVIEW mode (cheaper audits)

# Branch cleanup — automatic deletion of merged branches during git sync
# Every git_sync_interval iterations, Kōan detects merged branches (both
# regular merges via git ancestry and squash/rebase merges via GitHub API)
# and deletes them locally. Enable delete_remote_branches to also push-delete
# the corresponding remote refs (safe: only agent-prefixed branches are touched,
# the current branch is never deleted, and remote deletion failures are ignored
# if the remote branch was already removed by GitHub's auto-delete).
# branch_cleanup:
#   enabled: true                  # Master switch (default: true)
#   delete_remote_branches: true   # Also delete remote refs (default: true)
#                                  # Set false to only clean up local branches

# Git auto-merge configuration
# Automatically merges koan/* branches based on rules
git_auto_merge:
  enabled: false                    # Global on/off switch
  base_branch: "main"               # Default target branch for merges
  strategy: "squash"                # merge | squash | rebase
  rules:
    - pattern: "koan/*"             # Branch name pattern (glob-style)
      auto_merge: true              # Enable auto-merge for matching branches
      delete_after_merge: true      # Clean up branch after successful merge

# Schedule — control when deep exploration vs mission-only work happens
# deep_hours: time ranges for deep/contemplative work (higher exploration chance,
#              PR limits relaxed so exploration isn't blocked by pending reviews)
# work_hours: time ranges for mission-only work (exploration suppressed)
# Format: "START-END" using 24h hours. Wraps around midnight: "22-6".
# Multiple ranges: "0-6,22-24". Leave empty to disable.
# NOTE: deep_hours and work_hours should NOT overlap. If they do, deep_hours
# takes priority but work_hours has no effect during the overlap.
# Recommended: use non-overlapping ranges with a gap for normal behavior.
# Example: deep exploration at night (0-8), missions during work day (8-20),
#          normal behavior in the evening (20-24)
# schedule:
#   deep_hours: "0-8"
#   work_hours: "8-20"

# Log rotation — controls backup behavior when processes restart
# Previous logs are preserved as numbered backups (.log.1, .log.2, etc.)
# Older backups (.log.2+) are gzip-compressed to save disk space
# logs:
#   max_backups: 3          # Number of old log files to keep (default: 3)
#   max_size_mb: 50         # Max size per backup in MB (default: 50)
#   compress: true          # Gzip-compress backups .log.2+ (default: true)

# Usage estimation (auto-calibration from Claude JSON output)
# Tune these limits based on your Claude plan by comparing
# estimated % with actual /usage output in Claude CLI
usage:
  session_token_limit: 500000   # Tokens per 5h session window
  weekly_token_limit: 5000000   # Tokens per 7-day window

# Per-project overrides are now configured in projects.yaml.
# Supported per-project settings:
#   - git_auto_merge: per-project merge rules
#   - cli_provider: override AI provider ("claude", "codex", "copilot", "local")
#   - models: override model selection (mission, chat, lightweight, etc.)
#   - tools: restrict available tools (mission, chat tool lists)
#   - github: override authorized_users for GitHub @mention commands
# See projects.example.yaml for documentation and examples.

# Plan review loop — validates generated plans before posting to GitHub
# A lightweight subagent (Haiku) reviews each plan for missing file paths,
# TODO placeholders, oversized phases, scope creep, and missing tests.
# If issues are found, the plan is re-generated with reviewer feedback
# (up to max_rounds times). Disable if the extra latency is unwanted.
# plan_review:
#   enabled: true       # Run review loop after plan generation (default: true)
#   max_rounds: 3       # Maximum re-generation rounds per plan (default: 3)

# Prompt injection guard — scans incoming missions for suspicious patterns
# Detects instruction overrides, role confusion, secret extraction, shell injection.
# Complements outbox_scanner (output defense) with input-side defense.
# prompt_guard:
#   enabled: true          # Master switch (default: true)
#   block_mode: false      # false = warn + quarantine, true = reject mission entirely

# Dashboard — web UI for monitoring and interacting with Kōan
# When enabled, `make start` / `make stop` / `make restart` also manage
# the dashboard process. You can always run it standalone with `make dashboard`.
# dashboard:
#   enabled: false          # Include dashboard in managed processes (default: false)
#   port: 5001              # HTTP port (default: 5001)

# Auto-update — automatically keep Kōan up to date
# When enabled, Kōan periodically checks if upstream has new commits
# and pulls + restarts automatically. Checks run at startup and every
# N iterations. A 2-minute cache prevents excessive git fetches.
# See docs/auto-update.md for full details.
# auto_update:
#   enabled: true           # Master switch (default: false)
#   check_interval: 10      # Check every N iterations (default: 10)
#   notify: true            # Notify on Telegram before/after update (default: true)



# memory:
#  learnings_max_lines: 100        # Target after semantic compaction
#  learnings_hard_cap: 200         # Absolute max (safety net)
#  global_personality_max: 150     # Max lines for personality-evolution.md
#  global_emotional_max: 100       # Max lines for emotional-memory.md
#  compaction_interval_hours: 24   # How often cleanup runs

# GitHub notification-driven commands
# Enable Kōan to respond to @mentions in GitHub PR/issue comments.
# When a user posts "@nickname rebase" in a PR comment, Kōan reacts with 👍,
# creates a mission, and processes it in the next iteration.
# github:
#   nickname: "koan-bot"            # Bot's GitHub @mention name (required if enabled)
#   commands_enabled: false          # Master switch (default: false)
#   authorized_users: ["*"]          # "*" = all users, or list of GitHub usernames
#   max_age_hours: 24                # Ignore notifications older than this (default: 24)
#   check_interval_seconds: 60       # Base polling interval (default: 60, min: 10)
#   max_check_interval_seconds: 180  # Backoff cap when idle (default: 180, min: 30)
#   reply_enabled: false             # AI replies to non-command @mentions (default: false)
#                                    # When enabled, the bot replies to questions/requests
#                                    # from authorized users with contextual AI-generated answers.
#   reply_authorized_users: ["*"]    # Who can trigger AI replies (default: uses authorized_users)
#                                    # Separate from command permissions — allows broader audience
#                                    # for read-only replies. ["*"] = anyone (no permission check).
#                                    # Omit to fall back to authorized_users. Set [] to disable.
#                                    # Per-project override available in projects.yaml.
#   reply_rate_limit: 5              # Max AI replies per user per hour (default: 5, min: 1)
#                                    # Prevents API quota abuse when replies are open broadly.
#   natural_language: false           # NLP intent parsing for @mentions (default: false)
#                                    # When enabled, unrecognized commands are sent to Claude
#                                    # for intent classification before falling back to error.
#                                    # Per-project override available in projects.yaml.

# Jira notification-driven commands
# Enable Kōan to respond to @mentions in Jira issue comments.
# When a user posts "@nickname plan" in a Jira comment, Kōan creates a mission
# and processes it in the next iteration.
# jira:
#   enabled: false                       # Master switch (default: false)
#   base_url: "https://myorg.atlassian.net"  # Jira instance URL (required if enabled)
#   email: "bot@example.com"             # Atlassian account email for Basic auth (required)
#   api_token: ""                        # Jira API token (required); also via KOAN_JIRA_API_TOKEN
#   nickname: "koan-bot"                 # Bot's @mention name in Jira comments (required)
#   commands_enabled: false              # Reserved for future per-command filtering (default: false)
#   authorized_users: ["*"]             # "*" = all users, or list of Jira account emails
#   max_age_hours: 24                    # Ignore comments older than this (default: 24)
#   check_interval_seconds: 60           # Base polling interval (default: 60, min: 10)
#   max_check_interval_seconds: 180      # Backoff cap when idle (default: 180, min: 30)
#   projects:                            # Jira project key → Kōan project name mapping
#     FOO: myproject                     # Simple: FOO-123 → project "myproject"
#     BAR:                               # Extended: with optional target branch
#       project: anotherproject          #   BAR-456 → project "anotherproject"
#       branch: "11.126"                 #   PRs target branch "11.126" instead of default

# Review ignore patterns — exclude files from /review PR diffs.
# Applied before building the Claude prompt, reducing token spend on
# generated code, lock files, and vendor directories.
#
# glob: patterns are matched against the full file path from the diff.
#   - Patterns without '/' match the basename at any depth:
#       "*.lock" matches "package-lock.json", "subdir/yarn.lock"
#   - Patterns with '/' match the full path:
#       "vendor/**" matches "vendor/lodash.js" but not "src/vendor.js"
# regex: patterns are matched against the full file path (Python re.search).
#   A pattern like ".*\.pb\.go$" matches "api/types.pb.go".
#
# When all files are filtered out, the review returns "nothing to review"
# without calling Claude — saving quota entirely.
#
# review_ignore:
#   glob:
#     - "vendor/**"         # all files under vendor/
#     - "*.lock"            # lock files at any depth (yarn.lock, etc.)
#     - "*.min.js"          # minified JS bundles
#   regex:
#     - '.*\.pb\.go$'       # protobuf-generated Go files (full path regex)

# Review concurrency — parallel GitHub API calls during code reviews
# When enabled, PR context and comment fetching run concurrently using a
# ThreadPoolExecutor. The LLM call (Claude CLI) is always sequential.
# review_concurrency:
#   enabled: true           # Enable parallel GitHub API fetches (default: true)
#   github_workers: 4       # Max concurrent GitHub API calls (default: 4)

# Dashboard attention zone — GitHub @mention notifications
# When true, the dashboard attention zone also shows unread GitHub @mention
# notifications (reason: mention or review_requested). Requires github_url
# to be set in projects.yaml and the gh CLI to be authenticated.
# Default: false (avoids GitHub API calls for users who haven't configured it).
# attention_github_notifications: false

# Memory compaction — controls how learnings and global memory files are managed
# Learnings files grow append-only from PR reviews and agent experience.
# Compaction uses Claude (lightweight model) to merge redundant entries and
# remove obsolete ones. The hard cap is a safety net that truncates to keep
# the most recent entries if compaction output is still too large.
# Global personality/emotional files are simple tail-truncations (no AI).
# memory:
#   learnings_max_lines: 100        # Target after semantic compaction (default: 100)
#   learnings_hard_cap: 200         # Absolute max, safety net truncation (default: 200)
#   global_personality_max: 150     # Max lines for personality-evolution.md (default: 150)
#   global_emotional_max: 100       # Max lines for emotional-memory.md (default: 100)
#   compaction_interval_hours: 24   # How often to run cleanup (default: 24)

# Automation rules — loop guard
# Limits how many times a single automation rule can fire within a 60-second
# window. Prevents runaway loops, e.g. a create_mission rule triggered by
# post_mission that re-queues itself indefinitely.
# The counter is in-memory and resets when the agent restarts.
# automation_rules:
#   max_fires_per_minute: 5   # Per-rule rate limit (default: 5, min: 1)
