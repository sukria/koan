<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Kōan{% endblock %}</title>
    <!-- Apply saved theme before paint to avoid flash -->
    <script>try{var t=localStorage.getItem('koan_theme');if(t==='light')document.documentElement.dataset.theme='light';}catch(e){}</script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link id="favicon" rel="icon" href="{{ url_for('static', filename='favicon/default.svg') }}" type="image/svg+xml" data-base="{{ url_for('static', filename='favicon/') }}">
</head>
<body>
    <nav>
        <a href="/" class="logo">Kōan</a>
        <a href="/" {% if request.path == '/' %}class="active"{% endif %} id="nav-dashboard">Dashboard<span id="nav-attention-badge" class="nav-attention-badge" style="display:none;"></span></a>
        <a href="/missions" {% if request.path == '/missions' %}class="active"{% endif %}>Missions</a>
        <a href="/chat" {% if request.path == '/chat' %}class="active"{% endif %}>Chat</a>
        <a href="/usage" {% if request.path == '/usage' %}class="active"{% endif %}>Usage</a>
        <a href="/prs" {% if request.path == '/prs' %}class="active"{% endif %}>PRs</a>
        <a href="/plans" {% if request.path == '/plans' %}class="active"{% endif %}>Plans</a>
        <a href="/progress" {% if request.path == '/progress' %}class="active"{% endif %}>Progress</a>
        <a href="/journal" {% if request.path == '/journal' %}class="active"{% endif %}>Journal</a>
        <a href="/agent" {% if request.path.startswith('/agent') %}class="active"{% endif %} data-shortcut="a">Agent</a>
        <a href="/rules" {% if request.path == '/rules' %}class="active"{% endif %}>Rules</a>
        <button id="theme-toggle" title="Toggle theme">☀️</button>
        <select id="project-filter">
            <option value="">All projects</option>
        </select>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Keyboard shortcuts overlay -->
    <div id="shortcuts-help" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts">
        <div id="shortcuts-help-box">
            <h3>Keyboard shortcuts</h3>
            <div class="shortcut-row"><span>Dashboard</span><span class="shortcut-key">d</span></div>
            <div class="shortcut-row"><span>Missions</span><span class="shortcut-key">m</span></div>
            <div class="shortcut-row"><span>Chat</span><span class="shortcut-key">c</span></div>
            <div class="shortcut-row"><span>Usage</span><span class="shortcut-key">u</span></div>
            <div class="shortcut-row"><span>PRs</span><span class="shortcut-key">p</span></div>
            <div class="shortcut-row"><span>Plans</span><span class="shortcut-key">l</span></div>
            <div class="shortcut-row"><span>Progress</span><span class="shortcut-key">g</span></div>
            <div class="shortcut-row"><span>Journal</span><span class="shortcut-key">j</span></div>
            <div class="shortcut-row"><span>Agent</span><span class="shortcut-key">a</span></div>
            <div class="shortcut-row"><span>Rules</span><span class="shortcut-key">r</span></div>
            <div class="shortcut-row"><span>Show shortcuts</span><span class="shortcut-key">?</span></div>
            <span class="shortcut-close">Press Esc or click outside to close</span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
